<title>🚀 ROCKET FLOW - Bot com IA Gemini</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ffffff;font-family:'Segoe UI',sans-serif;min-height:100vh;padding:20px}
.container{max-width:1300px;margin:0 auto}
.header{text-align:center;margin-bottom:30px}
.header h1{color:#000000;font-size:2rem}
.header h1 span{color:#f97316}
.sub{color:#666666;margin-top:5px}
.crypto-strip{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin:20px 0}
.crypto-badge{background:#f0f0f0;padding:4px 12px;border-radius:40px;font-size:.7rem;color:#f97316}
.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:40px}
.plan-card{background:#f8f9fa;border-radius:24px;padding:24px;border:1px solid #e0e0e0;transition:.2s;cursor:pointer}

.plan-card.selected{border:2px solid #f97316;background:#fff3e6}
.plan-name{font-size:1.5rem;font-weight:700;color:#000000}
.plan-price{font-size:2rem;font-weight:700;color:#f97316;margin:15px 0}
.plan-price small{font-size:.8rem;color:#666666}
.feature-list{margin:15px 0}
.feature{padding:5px 0;font-size:.8rem;color:#333333}
.feature.yes{color:#2e7d32}
.btn-plan{width:100%;padding:12px;background:#f97316;border:none;border-radius:16px;color:#ffffff;font-weight:700;cursor:pointer;margin-top:15px}
.form-card{background:#f8f9fa;border-radius:24px;padding:30px;margin-top:20px;border:1px solid #e0e0e0}
.form-title{color:#000000;margin-bottom:20px}
input,textarea{width:100%;padding:14px;margin:10px 0;background:#ffffff;border:1px solid #cccccc;border-radius:12px;color:#000000;font-size:14px}
input:focus,textarea:focus{outline:none;border-color:#f97316}
textarea{min-height:80px;resize:vertical}
button{width:100%;padding:14px;background:#f97316;border:none;border-radius:12px;color:#ffffff;font-weight:700;cursor:pointer;margin-top:10px}
button:hover{opacity:0.9}
.hidden{display:none}
.success{color:#2e7d32}
.error{color:#d32f2f}
pre{background:#f0f0f0;padding:15px;border-radius:12px;overflow:auto;font-size:11px;color:#000000;white-space:pre-wrap;max-height:500px}
.footer{text-align:center;font-size:.7rem;color:#999999;margin-top:40px}
.badge{background:#f97316;color:#ffffff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.loading{display:inline-block;width:20px;height:20px;border:2px solid #f97316;border-radius:50%;border-top-color:transparent;animation:spin 1s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🚀 <span>ROCKET FLOW</span> <span class="badge">IA Gemini</span></h1>
<div class="sub">Bot com Inteligência Artificial | Descrições automáticas | Prompts predefinidos</div>
<div class="crypto-strip">
<span class="crypto-badge">₿ BTC</span><span class="crypto-badge">Ξ ETH</span>
<span class="crypto-badge">✦ USDT</span><span class="crypto-badge">◈ TON</span><span class="crypto-badge">⚡ BNB</span>
</div>
</div>

<div class="plans-grid" id="plansGrid"></div>

<div class="form-card hidden" id="formCard">
<h2 class="form-title" id="formTitle">Assinar Plano</h2>
<div id="selectedPlanInfo"></div>
<input type="text" id="botToken" placeholder="Token do Bot (do @BotFather)" value="8763858505:AAGZyp1SvvX9okEhWB3KPsCBhgi1cMUhiSk">
<input type="text" id="botUsername" placeholder="Username do bot" value="xRocketFlow_Bot">
<input type="text" id="merchantXrApi" placeholder="API Key xRocket" value="c01709a9c058bd25eeefea6b2">
<input type="text" id="geminiApiKey" placeholder="API Key Gemini" value="t7EVi0WmLjYIxpP9">
<textarea id="iaPrompt" placeholder="Prompt predefinido para IA (opcional)">Você é um copywriter especialista em vendas. Crie uma descrição atraente, persuasiva e curta para o seguinte produto. Use emojis e destaque benefícios. Máximo 200 caracteres.</textarea>
<div id="paymentResult"></div>
<button id="payBtn">🚀 GERAR BOT COM IA</button>
<button id="cancelBtn" style="background:#cccccc;color:#000000">Cancelar</button>
</div>

<div class="form-card hidden" id="resultCard">
<h2 class="form-title">✅ BOT COM IA GERADO!</h2>
<div id="botCode"></div>
<button id="copyBtn">📋 Copiar Código</button>
<button id="newPlanBtn">🔄 Novo Plano</button>
</div>

<div class="footer">
🔒 IA Gemini integrada | Prompts predefinidos | Descrições automáticas | Carrinho | Cupons | Webhook
</div>
</div>

<script>
// ============ CONFIGURAÇÃO INICIAL ============
const tg = window.Telegram.WebApp;
tg.expand();
const telegramUser = tg.initDataUnsafe?.user;

if (!telegramUser) {
    document.body.innerHTML = '<div style="text-align:center;color:#000000;padding:50px">❌ Abra este link pelo Telegram</div>';
    throw new Error();
}

const currentUser = {
    id: telegramUser.id,
    name: `${telegramUser.first_name} ${telegramUser.last_name || ''}`,
    username: telegramUser.username,
    firstName: telegramUser.first_name,
    languageCode: telegramUser.language_code || 'pt'
};

// ============ PLANOS ============
const PLANS = {
    basic: { name: '📀 BASIC', price: 5, fee: 0.10, maxProducts: 10, hasAI: true, affiliate: 10 },
    pro: { name: '⚡ PRO', price: 10, fee: 0.05, maxProducts: 25, hasAI: true, affiliate: 15 },
    business: { name: '💎 BUSINESS', price: 20, fee: 0.02, maxProducts: 50, hasAI: true, affiliate: 20 },
    enterprise: { name: '👑 ENTERPRISE', price: 50, fee: 0.005, maxProducts: 999, hasAI: true, affiliate: 25 }
};

let selectedPlan = null;

function renderPlans() {
    let html = '';
    for (const [k, v] of Object.entries(PLANS)) {
        html += `<div class="plan-card" onclick="window.selectPlan('${k}', event)">
            <div class="plan-name">${v.name}</div>
            <div class="plan-price">$${v.price}<small>/mês</small></div>
            <div class="feature-list">
                <div class="feature yes">📦 ${v.maxProducts} produtos</div>
                <div class="feature yes">🤖 IA para descrições</div>
                <div class="feature yes">🛒 Carrinho + Cupons</div>
                <div class="feature yes">💰 Taxa ${v.fee*100}%</div>
            </div>
            <button class="btn-plan" onclick="event.stopPropagation();window.selectPlan('${k}', event)">ESCOLHER</button>
        </div>`;
    }
    document.getElementById('plansGrid').innerHTML = html;
}

window.selectPlan = function(planKey, event) {
    selectedPlan = { key: planKey, ...PLANS[planKey] };
    document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
    if (event?.currentTarget) event.currentTarget.classList.add('selected');
    document.getElementById('formTitle').innerHTML = `📀 ${selectedPlan.name} - $${selectedPlan.price}/mês`;
    document.getElementById('selectedPlanInfo').innerHTML = `<div style="background:#f0f0f0;padding:15px;border-radius:12px;margin-bottom:15px">
        <div>💰 Preço: $${selectedPlan.price}</div>
        <div>📊 Taxa: ${selectedPlan.fee*100}%</div>
        <div>📦 Limite: ${selectedPlan.maxProducts} produtos</div>
        <div>🤖 IA: Descrições automáticas</div>
    </div>`;
    document.getElementById('formCard').classList.remove('hidden');
    document.getElementById('resultCard').classList.add('hidden');
    document.getElementById('paymentResult').innerHTML = '';
};

// ============ GERAR BOT COMPLETO COM IA ============
function generateBot(botToken, botUsername, merchantXrApi, geminiApiKey, iaPrompt) {
    const plan = selectedPlan;
    const adminId = currentUser.id;
    
    const botCode = `// ============================================
// 🤖 BOT ROCKET FLOW COM IA GEMINI
// ============================================
// ADMIN ID: ${adminId}
// PLANO: ${plan.name}
// IA: ATIVADA com prompt predefinido
// ============================================

const { Telegraf, Markup } = require('telegraf');
const axios = require('axios');
const express = require('express');

// ============ CONFIGURAÇÕES ============
const BOT_TOKEN = '${botToken}';
const XROCKET_API = '${merchantXrApi}';
const GEMINI_API_KEY = '${geminiApiKey}';
const ADMIN_ID = ${adminId};

// ============ PROMPT PREDEFINIDO PARA IA ============
const IA_PROMPT = \`${iaPrompt || 'Você é um copywriter especialista em vendas. Crie uma descrição atraente, persuasiva e curta para o seguinte produto. Use emojis e destaque benefícios. Máximo 200 caracteres.'}\`;

const bot = new Telegraf(BOT_TOKEN);
const app = express();
app.use(express.json());

// ============ BANCO DE DADOS ============
let produtos = [];
let carrinho = new Map();
let cupons = [
    { codigo: 'ROCKET10', desconto: 10, tipo: 'percentual', usos: 0, maxUsos: 100, ativo: true },
    { codigo: 'FREEBOSS', desconto: 100, tipo: 'percentual', usos: 0, maxUsos: 1, ativo: true }
];

// ============ FUNÇÃO IA GEMINI ============
async function gerarDescricaoComIA(nomeProduto) {
    if (!GEMINI_API_KEY) return null;
    
    try {
        const prompt = \`\${IA_PROMPT}\\n\\nProduto: \${nomeProduto}\`;
        
        const response = await axios.post(
            'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent',
            {
                contents: [{
                    parts: [{ text: prompt }]
                }],
                generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 150,
                    topP: 0.9
                }
            },
            {
                params: { key: GEMINI_API_KEY },
                headers: { 'Content-Type': 'application/json' }
            }
        );
        
        const descricao = response.data.candidates?.[0]?.content?.parts?.[0]?.text || null;
        return descricao ? descricao.replace(/\\n/g, ' ').substring(0, 200) : null;
    } catch (error) {
        console.error('Erro na IA:', error.response?.data || error.message);
        return null;
    }
}

// ============ FUNÇÃO PAGAMENTO ============
async function criarPagamento(items, compradorId, cupom = null) {
    let total = items.reduce((s, i) => s + (i.preco * (i.qtd || 1)), 0);
    if (cupom) {
        if (cupom.tipo === 'percentual') total *= (1 - cupom.desconto / 100);
        else total = Math.max(0, total - cupom.desconto);
    }
    
    try {
        const res = await axios.post('https://api.xrocketpay.com/v1/invoice', {
            amount: total,
            currency: 'USDT',
            description: \`Compra de \${items.length} produto(s)\`,
            external_id: \`order_\${compradorId}_\${Date.now()}\`,
            expires_in: 3600
        }, { headers: { 'Authorization': \`Bearer \${XROCKET_API}\` } });
        return { url: res.data.payment_url, total };
    } catch(e) { return null; }
}

function isAdmin(ctx) { return ctx.from.id === ADMIN_ID; }

// ============ MENUS ============
const mainMenu = Markup.inlineKeyboard([
    [Markup.button.callback('🛍️ PRODUTOS', 'products')],
    [Markup.button.callback('🛒 CARRINHO', 'cart')],
    [Markup.button.callback('🎫 CUPONS', 'coupons')],
    [Markup.button.callback('⚙️ ADMIN', 'admin')]
]);

const adminMenu = Markup.inlineKeyboard([
    [Markup.button.callback('➕ Add com IA', 'add_ia')],
    [Markup.button.callback('➕ Add manual', 'add_manual')],
    [Markup.button.callback('📋 Listar', 'list')],
    [Markup.button.callback('🎫 Criar Cupom', 'create_coupon')],
    [Markup.button.callback('🔙 Voltar', 'back')]
]);

// ============ COMANDOS ============
bot.start(async (ctx) => {
    await ctx.reply(
        \`🚀 *Bem-vindo!* \${isAdmin(ctx) ? '👑 ADMIN' : ''}\\n\\n` +
        \`📦 \${produtos.length} produtos\\n🤖 IA para descrições\\n💳 Aceitamos USDT\\n\\nUse os botões abaixo:\`,
        { parse_mode: 'Markdown', ...mainMenu }
    );
});

// ============ LISTAR PRODUTOS ============
bot.action('products', async (ctx) => {
    if (produtos.length === 0) return ctx.reply('📦 Nenhum produto ainda.');
    
    let msg = '*🛍️ PRODUTOS:*\\n\\n';
    const btns = [];
    for (let i = 0; i < produtos.length; i++) {
        const p = produtos[i];
        msg += \`*${p.nome}*\\n💰 $\${p.preco} USDT\\n📝 ${p.descricao || 'Sem descrição'}\\n━━━━━━\\n\`;
        btns.push([Markup.button.callback(\`➕ ${p.nome}\`, \`add_cart_\${i}\`)]);
    }
    btns.push([Markup.button.callback('🔙 Voltar', 'back')]);
    await ctx.reply(msg, { parse_mode: 'Markdown', ...Markup.inlineKeyboard(btns) });
});

// ============ ADICIONAR AO CARRINHO ============
bot.action(/add_cart_(\\d+)/, async (ctx) => {
    const idx = parseInt(ctx.match[1]);
    const prod = produtos[idx];
    if (!prod) return;
    
    let cart = carrinho.get(ctx.from.id) || [];
    const existente = cart.find(p => p.id === idx);
    if (existente) existente.qtd = (existente.qtd || 1) + 1;
    else cart.push({ ...prod, id: idx, qtd: 1 });
    carrinho.set(ctx.from.id, cart);
    
    await ctx.answerCbQuery(\`✅ \${prod.nome} adicionado!\`);
});

// ============ VER CARRINHO ============
bot.action('cart', async (ctx) => {
    const cart = carrinho.get(ctx.from.id) || [];
    if (cart.length === 0) return ctx.reply('🛒 Carrinho vazio!');
    
    let msg = '*🛒 SEU CARRINHO:*\\n\\n';
    let total = 0;
    for (const item of cart) {
        const subtotal = item.preco * (item.qtd || 1);
        total += subtotal;
        msg += \`*${item.nome}*\\n💰 $\${item.preco} x ${item.qtd || 1} = $\${subtotal}\\n━━━━\\n\`;
    }
    msg += \`\\n💰 *TOTAL: $\${total.toFixed(2)} USDT*\`;
    
    await ctx.reply(msg, {
        parse_mode: 'Markdown',
        ...Markup.inlineKeyboard([
            [Markup.button.callback('✅ FINALIZAR', 'checkout')],
            [Markup.button.callback('🎫 CUPOM', 'apply_coupon')],
            [Markup.button.callback('🔙 Voltar', 'back')]
        ])
    });
});

// ============ FINALIZAR ============
bot.action('checkout', async (ctx) => {
    const cart = carrinho.get(ctx.from.id) || [];
    if (cart.length === 0) return ctx.reply('Carrinho vazio!');
    
    await ctx.reply('🔄 Gerando pagamento...');
    const payment = await criarPagamento(cart, ctx.from.id);
    if (payment?.url) {
        await ctx.reply(\`💳 *PAGUE AQUI:*\\n${payment.url}\\n💰 Total: $\${payment.total.toFixed(2)} USDT\\n⏰ Válido 1 hora\`, { parse_mode: 'Markdown' });
        carrinho.delete(ctx.from.id);
    } else {
        await ctx.reply('❌ Erro ao gerar pagamento.');
    }
});

// ============ ADMIN - ADICIONAR COM IA ============
bot.action('add_ia', async (ctx) => {
    if (!isAdmin(ctx)) return ctx.reply('❌ Acesso negado!');
    await ctx.reply('🤖 *ADICIONAR PRODUTO COM IA*\\n\\nEnvie o NOME do produto e a IA criará a descrição automaticamente:\\n\\nExemplo: Curso de JavaScript Avançado', { parse_mode: 'Markdown' });
    ctx.session = { step: 'awaiting_ia_product' };
});

bot.action('add_manual', async (ctx) => {
    if (!isAdmin(ctx)) return;
    await ctx.reply('📝 *ADICIONAR MANUAL*\\n\\nEnvie no formato:\\nNome\\nPreço\\nDescrição', { parse_mode: 'Markdown' });
    ctx.session = { step: 'awaiting_manual_product' };
});

// ============ PROCESSAR TEXTO DO ADMIN ============
bot.on('text', async (ctx) => {
    if (!isAdmin(ctx)) return;
    
    // ADICIONAR COM IA
    if (ctx.session?.step === 'awaiting_ia_product') {
        const nomeProduto = ctx.message.text.trim();
        if (produtos.length >= ${plan.maxProducts}) {
            return ctx.reply(\`❌ Limite de \${${plan.maxProducts}} produtos atingido!\`);
        }
        
        await ctx.reply(\`🤖 Gerando descrição para "*${nomeProduto}*"...\`, { parse_mode: 'Markdown' });
        const descricaoIA = await gerarDescricaoComIA(nomeProduto);
        
        produtos.push({
            nome: nomeProduto,
            preco: 0,
            descricao: descricaoIA || 'Produto de alta qualidade',
            criadoPorIA: !!descricaoIA
        });
        
        await ctx.reply(\`✅ *${nomeProduto}* adicionado!\\n\\n📝 Descrição IA: ${descricaoIA || 'Gerada manualmente'}\\n\\n⚠️ Agora edite o preço com /preco ${produtos.length-1} VALOR\`, { parse_mode: 'Markdown' });
        ctx.session = {};
    }
    
    // ADICIONAR MANUAL
    if (ctx.session?.step === 'awaiting_manual_product') {
        const lines = ctx.message.text.split('\\n');
        if (lines.length < 2) return ctx.reply('❌ Formato: Nome\\nPreço\\nDescrição');
        
        const nome = lines[0].trim();
        const preco = parseFloat(lines[1]);
        const descricao = lines[2] || '';
        
        if (isNaN(preco)) return ctx.reply('❌ Preço inválido!');
        
        produtos.push({ nome, preco, descricao });
        await ctx.reply(\`✅ *${nome}* adicionado! Preço: $\${preco}\`, { parse_mode: 'Markdown' });
        ctx.session = {};
    }
    
    // EDITAR PREÇO
    if (ctx.message.text.startsWith('/preco')) {
        const parts = ctx.message.text.split(' ');
        const idx = parseInt(parts[1]);
        const preco = parseFloat(parts[2]);
        if (!isNaN(idx) && !isNaN(preco) && produtos[idx]) {
            produtos[idx].preco = preco;
            await ctx.reply(\`✅ Preço de *${produtos[idx].nome}* atualizado para $\${preco}\`, { parse_mode: 'Markdown' });
        }
    }
});

// ============ LISTAR PRODUTOS (ADMIN) ============
bot.action('list', async (ctx) => {
    if (!isAdmin(ctx)) return;
    if (produtos.length === 0) return ctx.reply('Nenhum produto');
    let msg = '*📋 PRODUTOS:*\\n';
    produtos.forEach((p, i) => msg += \`\${i+1}. ${p.nome} - $\${p.preco}\\n\`);
    await ctx.reply(msg, { parse_mode: 'Markdown' });
});

// ============ CRIAR CUPOM ============
bot.action('create_coupon', async (ctx) => {
    if (!isAdmin(ctx)) return;
    await ctx.reply('🎫 *CRIAR CUPOM*\\n\\nEnvie: CODIGO|DESCONTO|TIPO\\n\\nTipo: percentual ou fixo\\nExemplo: BLACK20|20|percentual', { parse_mode: 'Markdown' });
    ctx.session = { step: 'awaiting_coupon' };
});

bot.on('text', async (ctx) => {
    if (ctx.session?.step === 'awaiting_coupon' && isAdmin(ctx)) {
        const parts = ctx.message.text.split('|');
        if (parts.length >= 2) {
            cupons.push({
                codigo: parts[0].toUpperCase(),
                desconto: parseFloat(parts[1]),
                tipo: parts[2] === 'fixo' ? 'fixo' : 'percentual',
                usos: 0,
                maxUsos: 100,
                ativo: true
            });
            await ctx.reply(\`✅ Cupom *${parts[0]}* criado! ${parts[1]}% de desconto\`, { parse_mode: 'Markdown' });
            ctx.session = {};
        }
    }
});

// ============ CUPONS PÚBLICOS ============
bot.action('coupons', async (ctx) => {
    let msg = '🎫 *CUPONS ATIVOS:*\\n\\n';
    for (const c of cupons) {
        if (c.ativo) msg += \`*${c.codigo}* - ${c.desconto}% OFF\\n\`;
    }
    await ctx.reply(msg, { parse_mode: 'Markdown' });
});

bot.action('apply_coupon', async (ctx) => {
    await ctx.reply('🎫 Digite o código do cupom:');
    ctx.session = { step: 'awaiting_coupon_code' };
});

bot.on('text', async (ctx) => {
    if (ctx.session?.step === 'awaiting_coupon_code') {
        const codigo = ctx.message.text.toUpperCase();
        const cupom = cupons.find(c => c.codigo === codigo && c.ativo);
        if (cupom) {
            ctx.session.cupom = cupom;
            await ctx.reply(\`✅ Cupom *${codigo}* aplicado! ${cupom.desconto}% de desconto\`, { parse_mode: 'Markdown' });
        } else {
            await ctx.reply('❌ Cupom inválido ou expirado!');
        }
        ctx.session.step = null;
    }
});

// ============ WEBHOOK ============
app.post('/webhook/xrocket', async (req, res) => {
    console.log('📥 Webhook:', req.body.type);
    res.json({ ok: true });
});

bot.action('back', async (ctx) => {
    await ctx.reply('🏠 *MENU*', { parse_mode: 'Markdown', ...mainMenu });
});

// ============ INICIAR ============
bot.launch();
console.log('✅ Bot com IA rodando!');
console.log(\`👑 Admin: ${ADMIN_ID}\`);

process.once('SIGINT', () => bot.stop('SIGINT'));`;

    document.getElementById('botCode').innerHTML = `<pre>${escapeHtml(botCode)}</pre>`;
    document.getElementById('formCard').classList.add('hidden');
    document.getElementById('resultCard').classList.remove('hidden');
}

function escapeHtml(text) {
    return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// ============ EVENTOS ============
document.getElementById('payBtn').addEventListener('click', () => {
    const botToken = document.getElementById('botToken').value.trim();
    const botUsername = document.getElementById('botUsername').value.trim();
    const merchantApi = document.getElementById('merchantXrApi').value.trim();
    const geminiApiKey = document.getElementById('geminiApiKey').value.trim();
    const iaPrompt = document.getElementById('iaPrompt').value.trim();
    
    if (!botToken || !botUsername || !merchantApi) {
        document.getElementById('paymentResult').innerHTML = '<div class="error">❌ Preencha Token e API Key</div>';
        return;
    }
    
    generateBot(botToken, botUsername, merchantApi, geminiApiKey, iaPrompt);
});

document.getElementById('cancelBtn').addEventListener('click', () => {
    document.getElementById('formCard').classList.add('hidden');
    selectedPlan = null;
});

document.getElementById('copyBtn').addEventListener('click', () => {
    const code = document.querySelector('#botCode pre').innerText;
    navigator.clipboard.writeText(code);
    alert('✅ Código copiado!');
});

document.getElementById('newPlanBtn').addEventListener('click', () => {
    document.getElementById('resultCard').classList.add('hidden');
    renderPlans();
    selectedPlan = null;
});

renderPlans();
